<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DORA Dashboard Wireframe">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8D6"/>
      <stop offset="100%" stop-color="#D7F9F5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="48" y="58" font-size="34" font-family="Verdana, sans-serif" fill="#1D2A3A" font-weight="700">DORA 4 Metrics Dashboard (Prototype)</text>
  <text x="48" y="88" font-size="18" font-family="Verdana, sans-serif" fill="#586273">Lead Time, Deployment Frequency, Change Failure Rate, MTTR</text>

  <g font-family="Verdana, sans-serif">
    <rect x="48" y="120" width="266" height="110" rx="16" fill="#FFFEF8" stroke="#D8D0BB"/>
    <text x="68" y="160" font-size="18" fill="#586273">Lead Time Avg</text>
    <text x="68" y="198" font-size="38" fill="#E4572E" font-weight="700">9.1h</text>

    <rect x="326" y="120" width="266" height="110" rx="16" fill="#FFFEF8" stroke="#D8D0BB"/>
    <text x="346" y="160" font-size="18" fill="#586273">Deployments / week</text>
    <text x="346" y="198" font-size="38" fill="#FFC914" font-weight="700">6</text>

    <rect x="604" y="120" width="266" height="110" rx="16" fill="#FFFEF8" stroke="#D8D0BB"/>
    <text x="624" y="160" font-size="18" fill="#586273">Change Failure Rate</text>
    <text x="624" y="198" font-size="38" fill="#2E282A" font-weight="700">16.6%</text>

    <rect x="882" y="120" width="266" height="110" rx="16" fill="#FFFEF8" stroke="#D8D0BB"/>
    <text x="902" y="160" font-size="18" fill="#586273">MTTR Avg</text>
    <text x="902" y="198" font-size="38" fill="#17BEBB" font-weight="700">2.4h</text>
  </g>

  <rect x="48" y="254" width="552" height="380" rx="16" fill="#FFFEF8" stroke="#D8D0BB"/>
  <text x="72" y="286" font-size="20" font-family="Verdana, sans-serif" fill="#1D2A3A" font-weight="700">Lead Time / MTTR Trend</text>
  <polyline points="80,560 155,520 230,500 305,470 380,450 455,430 530,418" fill="none" stroke="#E4572E" stroke-width="4"/>
  <polyline points="80,590 155,570 230,550 305,530 380,505 455,490 530,480" fill="none" stroke="#17BEBB" stroke-width="4"/>

  <rect x="624" y="254" width="524" height="380" rx="16" fill="#FFFEF8" stroke="#D8D0BB"/>
  <text x="648" y="286" font-size="20" font-family="Verdana, sans-serif" fill="#1D2A3A" font-weight="700">Deployment & Failure</text>
  <g>
    <rect x="680" y="500" width="42" height="80" fill="#FFC914"/>
    <rect x="730" y="550" width="42" height="30" fill="#2E282A"/>

    <rect x="790" y="470" width="42" height="110" fill="#FFC914"/>
    <rect x="840" y="540" width="42" height="40" fill="#2E282A"/>

    <rect x="900" y="430" width="42" height="150" fill="#FFC914"/>
    <rect x="950" y="560" width="42" height="20" fill="#2E282A"/>

    <rect x="1010" y="410" width="42" height="170" fill="#FFC914"/>
    <rect x="1060" y="570" width="42" height="10" fill="#2E282A"/>
  </g>
</svg>
