name: Feature Request
description: 기능 제안 및 개선 요청을 등록합니다.
title: "[FEATURE] "
labels: ["type: feature", "status: ready"]
body:
  - type: markdown
    attributes:
      value: |
        기능 제안 배경과 기대 효과를 작성해주세요.

  - type: input
    id: summary
    attributes:
      label: 기능 요약
      description: 제안하는 기능을 한 줄로 설명하세요.
      placeholder: 예) 주차별 진행률을 보여주는 요약 카드 추가
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 문제/개선 배경
      description: 현재 어떤 불편이 있는지 설명하세요.
      placeholder: 현재는 과제 진행률을 파일별로 직접 확인해야 함
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 구현 아이디어를 작성해주세요.
      placeholder: README에 진행률 배지를 추가하고 자동 갱신 스크립트 연동
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준(AC)
      description: 체크 가능한 완료 기준을 입력하세요.
      placeholder: |
        - [ ] 진행률 카드가 표시된다
        - [ ] 데이터가 최신 값으로 갱신된다
        - [ ] 문서에 사용법이 추가된다
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - high
        - medium
        - low
      default: 1
    validations:
      required: true

  - type: input
    id: milestone
    attributes:
      label: 목표 마일스톤
      placeholder: Sprint 1 (Planning & Setup)
