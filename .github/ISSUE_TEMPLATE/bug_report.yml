name: Bug Report
description: 버그를 제보하고 재현 정보를 남깁니다.
title: "[BUG] "
labels: ["type: bug", "status: ready"]
body:
  - type: markdown
    attributes:
      value: |
        재현 가능한 정보를 가능한 자세히 작성해주세요.

  - type: input
    id: summary
    attributes:
      label: 요약
      description: 어떤 문제가 발생했는지 한 줄로 설명하세요.
      placeholder: 예) 대시보드에서 MTTR 카드가 0으로 고정됨
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 순서대로 입력해주세요.
      placeholder: |
        1. docs/dora-dashboard.html 열기
        2. 새로고침
        3. MTTR 카드 확인
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      placeholder: 정상적으로 최신 MTTR 값이 표시되어야 함
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      placeholder: 항상 0으로 표시됨
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 실행 환경
      description: OS, 브라우저, 실행 방법 등을 적어주세요.
      placeholder: Windows 11 / Chrome 124 / local file open

  - type: textarea
    id: logs
    attributes:
      label: 로그/스크린샷
      description: 콘솔 로그나 스크린샷이 있으면 첨부해주세요.
      placeholder: 관련 로그 또는 이미지
