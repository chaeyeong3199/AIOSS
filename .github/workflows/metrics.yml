name: DORA Metrics Collection

on:
  pull_request:
    types: [closed]
  deployment:
  deployment_status:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch: 

permissions:
  contents: read
  issues: write

jobs:
  collect-and-store-metrics:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: 1. Calculate Lead Time
      id: lead_time
      if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
      run: |
        FIRST_COMMIT_TIME="${{ github.event.pull_request.created_at }}"
        MERGE_TIME="${{ github.event.pull_request.merged_at }}"
        LEAD_TIME_SECONDS=$(($(date -d "$MERGE_TIME" +%s) - $(date -d "$FIRST_COMMIT_TIME" +%s)))
        echo "Lead Time: $LEAD_TIME_SECONDS seconds"
        echo "LEAD_TIME=$LEAD_TIME_SECONDS" >> $GITHUB_ENV

    - name: 2. Track Deployment Frequency
      if: github.event_name == 'deployment'
      run: |
        echo "Deployment at: $(date)"
        echo "Environment: ${{ github.event.deployment.environment }}"
        echo "DF_COUNT=1" >> $GITHUB_ENV

    - name: 3. Track Change Failure Rate
      if: github.event_name == 'deployment_status'
      run: |
        STATUS="${{ github.event.deployment_status.state }}"
        if [ "$STATUS" = "success" ]; then
          echo "✅ Deployment succeeded"
          echo "CFR_RESULT=0.0" >> $GITHUB_ENV
        elif [ "$STATUS" = "failure" ]; then
          echo "❌ Deployment failed"
          echo "CFR_RESULT=1.0" >> $GITHUB_ENV
        fi

    - name: 4. MTTR Health Check
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      run: |
        # 테스트를 위해 github.com 헬스체크 활용
        if ! curl -f https://github.com; then
          echo "Service is down!"
        else
          echo "Service is healthy!"
        fi

    - name: Save Metrics to Artifact
      run: |
        # 환경 변수 값이 없을 경우를 대비한 기본값(0) 할당 로직
        LT=${LEAD_TIME:-0}
        DF=${DF_COUNT:-0}
        CFR=${CFR_RESULT:-0.0}
        MTTR=0 
        
        cat <<EOF > dora_metrics.json
        {
          "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
          "lead_time_seconds": $LT,
          "deployment_frequency": $DF,
          "mttr_seconds": $MTTR,
          "change_failure_rate": $CFR
        }
        EOF
        cat dora_metrics.json

    - name: Upload Metrics as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dora-metrics-data
        path: dora_metrics.json

    - name: 5. Generate Weekly Report Issue (과제 요구사항 4번)
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        LT=${LEAD_TIME:-0}
        DF=${DF_COUNT:-0}
        CFR=${CFR_RESULT:-0.0}
        MTTR=0
        
        gh issue create \
          --title "📊 주간 DORA Metrics 리포트 ($(date +'%Y-%m-%d'))" \
          --body "이번 주 소프트웨어 전달 성능 지표(DORA) 수집 결과입니다.
          
          - **Lead Time for Changes**: ${LT}초
          - **Deployment Frequency**: ${DF}회
          - **Change Failure Rate**: ${CFR}
          - **MTTR**: ${MTTR}초
          