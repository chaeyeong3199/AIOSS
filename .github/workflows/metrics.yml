name: DORA Metrics Collection

on:
  pull_request:
    types: [closed]
  deployment:
  deployment_status:
  issues:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect-dora-metrics:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: 1. Calculate Lead Time
      id: lead_time
      if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
      run: |
        FIRST_COMMIT_TIME="${{ github.event.pull_request.created_at }}"
        MERGE_TIME="${{ github.event.pull_request.merged_at }}"
        LEAD_TIME_SECONDS=$(($(date -d "$MERGE_TIME" +%s) - $(date -d "$FIRST_COMMIT_TIME" +%s)))
        echo "Lead Time: $LEAD_TIME_SECONDS seconds"
        echo "LEAD_TIME=$LEAD_TIME_SECONDS" >> $GITHUB_ENV

    - name: 2. Track Deployment Frequency
      if: github.event_name == 'deployment'
      run: |
        echo "Deployment at: $(date)"
        echo "Environment: ${{ github.event.deployment.environment }}"
        echo "DF_COUNT=1" >> $GITHUB_ENV

    - name: 3. Track Change Failure Rate
      if: github.event_name == 'deployment_status'
      run: |
        STATUS="${{ github.event.deployment_status.state }}"
        if [ "$STATUS" = "success" ]; then
          echo "✅ Deployment succeeded"
          echo "CFR_RESULT=0.0" >> $GITHUB_ENV
        elif [ "$STATUS" = "failure" ]; then
          echo "❌ Deployment failed"
          echo "CFR_RESULT=1.0" >> $GITHUB_ENV
        else
          echo "ℹ️ Deployment status is $STATUS"
          echo "CFR_RESULT=0.0" >> $GITHUB_ENV
        fi

    - name: 4. Calculate MTTR from incident issue
      if: github.event_name == 'issues' && github.event.action == 'closed' && contains(github.event.issue.labels.*.name, 'incident')
      run: |
        ISSUE_CREATED="${{ github.event.issue.created_at }}"
        ISSUE_CLOSED="${{ github.event.issue.closed_at }}"
        MTTR_SECONDS=$(($(date -d "$ISSUE_CLOSED" +%s) - $(date -d "$ISSUE_CREATED" +%s)))
        echo "MTTR: $MTTR_SECONDS seconds"
        echo "MTTR_SECONDS=$MTTR_SECONDS" >> $GITHUB_ENV

    - name: Publish DORA Metrics to Job Summary
      run: |
        LT=${LEAD_TIME:-0}
        DF=${DF_COUNT:-0}
        CFR=${CFR_RESULT:-0.0}
        MTTR=${MTTR_SECONDS:-0}

        {
          echo "## DORA Metrics Snapshot"
          echo ""
          echo "- Event: ${{ github.event_name }}"
          echo "- Lead Time for Changes (sec): $LT"
          echo "- Deployment Frequency (event count): $DF"
          echo "- Change Failure Rate (0=success,1=failure): $CFR"
          echo "- MTTR (sec): $MTTR"
        } >> $GITHUB_STEP_SUMMARY
          