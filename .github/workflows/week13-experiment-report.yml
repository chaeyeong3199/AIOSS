name: Week 13 Experiment Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Week 13 data
        run: npm run experiment:l13

      - name: Generate Week 13 report
        run: npm run report:l13

      - name: Upload experiment report
        uses: actions/upload-artifact@v7
        with:
          name: week13-experiment-report
          path: |
            assignments/L13/data/
            assignments/L13/reports/

      - name: Create GitHub issue summary
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("fs");
            const report = fs.readFileSync("assignments/L13/reports/week13-summary.md", "utf8");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "[L13] Weekly Lean Startup Experiment Report",
              body: report
            });
