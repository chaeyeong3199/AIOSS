name: Python CI

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Python
        uses: ./.github/actions/python-setup
        with:
          python-version: '3.11'
          requirements-files: ''

      - name: Create build artifact
        shell: python
        run: |
          from pathlib import Path
          import zipfile

          output_dir = Path('build-output')
          output_dir.mkdir(exist_ok=True)
          archive_path = output_dir / 'source.zip'

          excluded = {'.git', '.venv', 'build-output', '__pycache__'}
          with zipfile.ZipFile(archive_path, 'w', compression=zipfile.ZIP_DEFLATED) as archive:
              for path in Path('.').rglob('*'):
                  if any(part in excluded for part in path.parts):
                      continue
                  if path.is_file():
                      archive.write(path, path.as_posix())

          (output_dir / 'metadata.txt').write_text('Built source archive for L07 CI/CD\n', encoding='utf-8')

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-package
          path: build-output/

  quality:
    needs: build
    uses: ./.github/workflows/python-quality.yml
    with:
      run-tests: true
      upload-results: true

  deploy:
    name: Deploy (conditional)
    needs: [build, quality]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect deployment-worthy changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deploy:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'scripts/**'
              - 'docs/**'
              - 'requirements*.txt'
              - 'assignments/L08/**'

      - name: Download build artifact
        if: steps.filter.outputs.deploy == 'true'
        uses: actions/download-artifact@v4
        with:
          name: source-package
          path: deploy-package

      - name: Deploy step (with secret injection)
        if: steps.filter.outputs.deploy == 'true'
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Deploy step: using DEPLOY_TOKEN secret for secure deployment."
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "Warning: DEPLOY_TOKEN not set. Set it in repository Secrets."
          else
            echo "DEPLOY_TOKEN is securely available (length: ${#DEPLOY_TOKEN})"
          fi
          ls -la deploy-package
          echo "Deployment would proceed with secured credentials when gate conditions pass."

      - name: Skip deploy when nothing relevant changed
        if: steps.filter.outputs.deploy != 'true'
        run: echo "No deployment-worthy file changes detected."